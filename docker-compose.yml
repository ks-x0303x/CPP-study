services:
  #ubuntu-ssh:
  ubuntu-env:
    build:
      context: .
      dockerfile: Dockerfile
    image: ubuntu-env:latest
    ports:
    # - "2222:22"
      - "8080:8080"
      - "10000:10000" # gdb server
    #network_mode: host
    # networks:
    #   my_network:
    #     ipv4_address: 172.18.0.23
    volumes:
      - ./Shared:/home/ubuntu/Shared
      - ./config:/usr/local/config
    tty: true
    stdin_open: true
    cap_add:
      - SYS_PTRACE
    command: /bin/bash

